<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>仙台すずめ踊り 大太鼓練習機</title>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        h1 { font-size: 20px; color: #e67e22; margin: 10px 0; }
        #lane { position: relative; width: 100%; height: 140px; background: #000; border-top: 4px solid #555; border-bottom: 4px solid #555; margin: 10px 0; overflow: hidden; }
        #target { position: absolute; left: 60px; width: 70px; height: 100%; border: 4px solid yellow; box-sizing: border-box; z-index: 10; border-radius: 50%; }
        .note { position: absolute; top: 30px; width: 70px; height: 70px; background: radial-gradient(circle, #ff4500, #b30000); border-radius: 50%; border: 2px solid white; line-height: 70px; font-weight: bold; z-index: 5; }
        .measure-line { position: absolute; width: 2px; height: 100%; background: #444; z-index: 1; }
        #judge-display { font-size: 40px; font-weight: bold; height: 50px; color: #ff0; }
        #info { font-size: 18px; color: #0f0; }
        
        /* タップ受け付け用の透明レイヤー */
        #touch-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: none; }

        .controls { position: relative; z-index: 200; margin-top: 5px; display: flex; justify-content: center; gap: 10px; }
        button { padding: 15px 25px; font-size: 16px; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
        #start-btn { background: #e67e22; padding: 20px 50px; font-size: 22px; z-index: 300; }
        #pause-btn { background: #3498db; display: none; }
        #retry-btn { background: #e74c3c; display: none; }
    </style>
</head>
<body>

    <h1>仙台すずめ踊り 大太鼓練習機</h1>
    <div id="info">スコア: 0</div>
    <div id="judge-display">READY</div>
    
    <div id="lane"><div id="target"></div></div>
    
    <div id="touch-layer"></div>

    <div class="controls">
        <button id="start-btn">演奏開始！</button>
        <button id="pause-btn">一時停止</button>
        <button id="retry-btn">リトライ</button>
    </div>

    <audio id="bgm" src="bgm.mp3" preload="auto"></audio>

<script>
const bpm = 120;
const secPerBeat = 60 / bpm;
const scrollSpeed = 400;
const targetX = 60;

const tjaData = [
     { m: "0000", beat: 4 }, { m: "0000", beat: 4 }, // 予備8拍
    { m: "1010", beat: 4 },
    { m: "1001000010001000", beat: 4 }, { m: "0001000010000000", beat: 4 },
    { m: "1001000010001000", beat: 4 }, { m: "0001000010000000", beat: 4 },
    { m: "1001000010001000", beat: 4 }, { m: "0001000010000000", beat: 4 },
    { m: "100000000001000010000000", beat: 6 }, // 6/4
    { m: "1001000010001000", beat: 4 }, { m: "0001000010000000", beat: 4 },
    { m: "1001000010001000", beat: 4 }, { m: "0001000010000000", beat: 4 },
    { m: "1001000010001000", beat: 4 }, { m: "0001000010000000", beat: 4 },
    { m: "1001000010000000", beat: 4 }, { m: "1001000010001000", beat: 4 },
    { m: "0001000010000000", beat: 4 }, { m: "1001000010001000", beat: 4 },
    { m: "0001000010000000", beat: 4 }, { m: "1001000010001000", beat: 4 },
    { m: "0001000010000000", beat: 4 }, { m: "1001000010001000", beat: 4 },
    { m: "0001000010000000", beat: 4 }, { m: "1001000010001000", beat: 4 },
    { m: "0001000010000000", beat: 4 }, { m: "1001000010001000", beat: 4 },
    { m: "0001000010000000", beat: 4 }, { m: "1111", beat: 4 }, { m: "1110", beat: 4 }
];

let ctx, notes = [], startTime = 0, score = 0;
let isPaused = false, pauseStartTime = 0, totalPausedTime = 0;
let animationId;
const audio = document.getElementById('bgm');
const touchLayer = document.getElementById('touch-layer');

// 開始ボタンのクリックイベント
document.getElementById('start-btn').addEventListener('click', initGame);
document.getElementById('pause-btn').addEventListener('click', togglePause);
document.getElementById('retry-btn').addEventListener('click', retry);

function initGame() {
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('pause-btn').style.display = 'inline-block';
    document.getElementById('retry-btn').style.display = 'inline-block';
    touchLayer.style.display = 'block'; // タップ層を有効化

    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    
    // iOS/Android用の音声アクティベート
    const silence = ctx.createBuffer(1, 1, 22050);
    const source = ctx.createBufferSource();
    source.buffer = silence;
    source.connect(ctx.destination);
    source.start();

    resetData();
    audio.currentTime = 0.2;
    audio.play();
    startTime = ctx.currentTime;
    totalPausedTime = 0;
    isPaused = false;
    
    renderNotes();
    update();
}

function resetData() {
    score = 0;
    document.getElementById('info').innerText = "スコア: 0";
    document.getElementById('judge-display').innerText = "演奏中";
    const lane = document.getElementById('lane');
    const oldItems = lane.querySelectorAll('.note, .measure-line');
    oldItems.forEach(el => el.remove());
    notes = [];
}

function renderNotes() {
    let nextNoteTime = startTime;
    const lane = document.getElementById('lane');
    tjaData.forEach(measure => {
        const line = document.createElement('div');
        line.className = 'measure-line';
        lane.appendChild(line);
        notes.push({ el: line, t: nextNoteTime, isNote: false });
        const step = (measure.beat * secPerBeat) / measure.m.length;
        for(let i=0; i < measure.m.length; i++) {
            if(measure.m[i] === '1') {
                const div = document.createElement('div');
                div.className = 'note';
                div.innerText = "ドン";
                lane.appendChild(div);
                notes.push({ el: div, t: nextNoteTime, isNote: true, hit: false });
            }
            nextNoteTime += step;
        }
    });
}

function update() {
    if (isPaused) return;
    const now = ctx.currentTime - totalPausedTime;
    notes.forEach(n => {
        const x = targetX + (n.t - now) * scrollSpeed;
        n.el.style.left = x + 'px';
        if (n.isNote && !n.hit && x < (targetX - 50)) {
            n.hit = true;
            showJudge("不可...", "#888");
        }
    });
    animationId = requestAnimationFrame(update);
}

function togglePause() {
    if (!isPaused) {
        isPaused = true;
        audio.pause();
        pauseStartTime = ctx.currentTime;
        document.getElementById('pause-btn').innerText = "再開";
        touchLayer.style.display = 'none'; // 一時停止中はタップ無効
    } else {
        isPaused = false;
        audio.play();
        totalPausedTime += (ctx.currentTime - pauseStartTime);
        document.getElementById('pause-btn').innerText = "一時停止";
        touchLayer.style.display = 'block';
        update();
    }
}

function retry() {
    cancelAnimationFrame(animationId);
    audio.pause();
    initGame();
}

function showJudge(txt, color) {
    const j = document.getElementById('judge-display');
    j.innerText = txt;
    j.style.color = color;
}

function handleInput(e) {
    if(e) e.preventDefault();
    if(!ctx || isPaused) return;
    
    // SE再生
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.frequency.value = 150;
    g.gain.setValueAtTime(0.5, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.2);

    const now = ctx.currentTime - totalPausedTime;
    const n = notes.find(x => x.isNote && !x.hit && Math.abs(x.t - now) < 0.15);
    if (n) {
        const diff = Math.abs(n.t - now);
        n.hit = true;
        n.el.style.display = 'none';
        if (diff < 0.06) { showJudge("良！", "#ff0"); score += 100; }
        else { showJudge("可", "#0f0"); score += 50; }
        document.getElementById('info').innerText = "スコア: " + score;
    }
}

// 物理キーとスマホタップの両方
window.addEventListener('keydown', (e) => { if(e.key === 'f') handleInput(); });
touchLayer.addEventListener('touchstart', handleInput, { passive: false });
</script>
</body>
</html>
